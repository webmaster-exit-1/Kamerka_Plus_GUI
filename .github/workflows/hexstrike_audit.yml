# .github/workflows/hexstrike-agent-audit.yml

name: HexStrike Agent Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  hexstrike-agent-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install HexStrike MCP server
        run: |
          git clone https://github.com/0x4m4/hexstrike-ai.git /tmp/hexstrike-ai
          cd /tmp/hexstrike-ai
          python3 -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt
          nohup python3 hexstrike_server.py --port 8888 &
          sleep 15

      - name: Discover OSINT/exploit files
        id: discover
        run: |
          find . -type f \( -iname '*osint*' -o -iname '*exploit*' -o -iname '*scan*' \) > hexstrike_targets.txt
          cat hexstrike_targets.txt

      - name: Run HexStrike audit tools and parse findings
        id: audit
        env:
          HEXSTRIKE_MCP_URL: "http://127.0.0.1:8888"
        run: |
          . /tmp/hexstrike-ai/venv/bin/activate
          TOOLS="ai_vulnerability_assessment bugbounty_osint_gathering ai_reconnaissance_workflow amass_scan nuclei_scan dalfox_xss_scan nmap_scan autorecon_scan bugbounty_business_logic_testing clair_vulnerability_scan cve_intelligence_lookup dirsearch_scan enum4linux_scan osint_scan"
          echo "## HexStrike Automated Audit" > hexstrike_audit.md
          echo "[HexStrikeFindings]" > critical_findings.txt
          echo "[FileFixSuggestions]" > fix_suggestions.txt

          for FILE in $(cat hexstrike_targets.txt); do
            echo "" >> hexstrike_audit.md
            echo "### $FILE" >> hexstrike_audit.md
            for TOOL in $TOOLS; do
              echo "**$TOOL**" >> hexstrike_audit.md
              OUT=$(python3 /tmp/hexstrike-ai/hexstrike_mcp.py --server $HEXSTRIKE_MCP_URL --tool $TOOL --file $FILE 2>&1 || echo "Error running $TOOL")
              echo "$OUT" >> hexstrike_audit.md
              echo "" >> hexstrike_audit.md

              # Detect critical results and possible code suggestions -- adjust grep/parsing as needed!
              if echo "$OUT" | grep -iq 'CRITICAL'; then
                echo "$FILE, $TOOL" >> critical_findings.txt
                echo "$OUT" >> critical_findings.txt
                echo "---" >> critical_findings.txt
              fi
              if echo "$OUT" | grep -iq 'SUGGESTION\|FIX\|PATCH'; then
                echo "$FILE, $TOOL" >> fix_suggestions.txt
                echo "$OUT" >> fix_suggestions.txt
                echo "---" >> fix_suggestions.txt
              fi
            done
          done

      - name: Upload report as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexstrike-audit-report
          path: hexstrike_audit.md

      - name: Post HexStrike summary as PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### :robot: HexStrike Automated Agent Audit

            The HexStrike agent scanned all likely OSINT and exploit files for vulnerabilities, robustness, and best practices.

            **See attached artifact for full findings**:  
            - [hexstrike-audit-report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ${{ steps.audit.outputs.summary }}

            _Critical findings are automatically filed as Issues. Code fix suggestions are left as PR comments if available._

      - name: Create GitHub Issues for critical findings
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse critical findings and open issues for each (max. 10 issues for demo; refine as needed)
          c=0
          awk '/^\[HexStrikeFindings\]/{flag=1; next}/^\[FileFixSuggestions\]/{flag=0}flag' critical_findings.txt | \
          awk 'BEGIN{FS="\n"; RS="---\n"} {print $0}' | while read -r block; do
            [ -z "$block" ] && continue
            ((c++))
            if (( c > 10 )); then break; fi
            TITLE_LINE=$(echo "$block" | head -n1)
            ISSUE_TITLE="HexStrike Critical Security Issue: $TITLE_LINE"
            ISSUE_BODY="$block Automated by HexStrike Agent. Please review and remediate ASAP."
            gh issue create --repo ${{ github.repository }} --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "security, urgent"
          done

      - name: Suggest code fixes as PR review comments (demo)
        if: always()
        uses: thollander/actions-comment-pull-request@v2
        with:
          filePath: fix_suggestions.txt
