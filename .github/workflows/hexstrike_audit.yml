# .github/workflows/hexstrike_audit.yml

name: HexStrike Agent Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

defaults:
  run:
    shell: bash -eo pipefail {0}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  hexstrike-agent-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Initialize report files
        run: |
          echo "## HexStrike Automated Audit" > hexstrike_audit.md
          echo "(No audit results — HexStrike server or scan did not run.)" >> hexstrike_audit.md
          echo "[HexStrikeFindings]" > critical_findings.txt
          echo "[FileFixSuggestions]" > fix_suggestions.txt

      - name: Install and start HexStrike MCP server
        run: |
          git clone https://github.com/0x4m4/hexstrike-ai.git /tmp/hexstrike-ai
          cd /tmp/hexstrike-ai
          python3 -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt
          nohup python3 hexstrike_server.py --port 8888 &
          # Wait for the server to accept connections (up to 30 s).
          # The root endpoint may return 404, so we only check that the
          # server is listening (no -f flag) rather than requiring 2xx.
          ready=false
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:8888/; then
              echo "HexStrike server is ready"
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "::error::HexStrike server failed to start within 30 s"
            # Show last few log lines for debugging
            tail -20 nohup.out 2>/dev/null || true
            exit 1
          fi

      - name: Discover OSINT/exploit files
        id: discover
        run: |
          find . -type f \( -iname '*osint*' -o -iname '*exploit*' -o -iname '*scan*' \) > hexstrike_targets.txt
          cat hexstrike_targets.txt

      - name: Run HexStrike audit tools and parse findings
        id: audit
        env:
          HEXSTRIKE_MCP_URL: "http://127.0.0.1:8888"
        run: |
          . /tmp/hexstrike-ai/venv/bin/activate
          TOOLS="ai_vulnerability_assessment bugbounty_osint_gathering ai_reconnaissance_workflow amass_scan nuclei_scan dalfox_xss_scan nmap_scan autorecon_scan bugbounty_business_logic_testing clair_vulnerability_scan cve_intelligence_lookup dirsearch_scan enum4linux_scan osint_scan"
          echo "## HexStrike Automated Audit" > hexstrike_audit.md
          echo "[HexStrikeFindings]" > critical_findings.txt
          echo "[FileFixSuggestions]" > fix_suggestions.txt

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            echo "" >> hexstrike_audit.md
            echo "### $FILE" >> hexstrike_audit.md
            for TOOL in $TOOLS; do
              echo "**$TOOL**" >> hexstrike_audit.md
              OUT=$(python3 /tmp/hexstrike-ai/hexstrike_mcp.py --server "$HEXSTRIKE_MCP_URL" --tool "$TOOL" --file "$FILE" 2>&1 || echo "Error running $TOOL")
              echo "$OUT" >> hexstrike_audit.md
              echo "" >> hexstrike_audit.md

              # Detect critical results and possible code suggestions
              if echo "$OUT" | grep -iq 'CRITICAL'; then
                echo "$FILE, $TOOL" >> critical_findings.txt
                echo "$OUT" >> critical_findings.txt
                echo "---" >> critical_findings.txt
              fi
              if echo "$OUT" | grep -iq 'SUGGESTION\|FIX\|PATCH'; then
                echo "$FILE, $TOOL" >> fix_suggestions.txt
                echo "$OUT" >> fix_suggestions.txt
                echo "---" >> fix_suggestions.txt
              fi
            done
          done < hexstrike_targets.txt

      - name: Upload report as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hexstrike-audit-report
          path: hexstrike_audit.md

      - name: Post HexStrike summary as PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### :robot: HexStrike Automated Agent Audit

            The HexStrike agent scanned all likely OSINT and exploit files for vulnerabilities, robustness, and best practices.

            **See attached artifact for full findings**:  
            - [hexstrike-audit-report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ${{ steps.audit.outputs.summary }}

            _Critical findings are automatically filed as Issues. Code fix suggestions are left as PR comments if available._

      - name: Create GitHub Issues for critical findings
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse critical findings into NUL-delimited records for safe multi-line iteration
          awk '/^\[HexStrikeFindings\]/{flag=1; next}/^\[FileFixSuggestions\]/{flag=0}flag' critical_findings.txt | \
          awk 'BEGIN{RS="---\n"; ORS="\0"} NF{print}' > /tmp/hexstrike_blocks.bin

          c=0
          while IFS= read -r -d '' block; do
            [ -z "$block" ] && continue
            c=$((c + 1))
            if [ "$c" -gt 10 ]; then break; fi
            TITLE_LINE=$(echo "$block" | head -n1)
            ISSUE_TITLE="HexStrike Critical Security Issue: $TITLE_LINE"
            ISSUE_BODY="$(printf '%s\n\nAutomated by HexStrike Agent. Please review and remediate ASAP.' "$block")"
            issue_output=$(gh issue create --repo "${{ github.repository }}" --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "security" --label "urgent" 2>&1)
            issue_status=$?
            if [ "$issue_status" -ne 0 ]; then
              if echo "$issue_output" | grep -Eqi 'label.*not found|could not resolve to a label|invalid label'; then
                echo "Issue labels missing; retrying without labels for: $ISSUE_TITLE"
                retry_output=$(gh issue create --repo "${{ github.repository }}" --title "$ISSUE_TITLE" --body "$ISSUE_BODY" 2>&1)
                retry_status=$?
                if [ "$retry_status" -ne 0 ]; then
                  echo "$retry_output"
                  exit "$retry_status"
                fi
              else
                echo "$issue_output"
                exit "$issue_status"
              fi
            fi
          done < /tmp/hexstrike_blocks.bin

      - name: Suggest code fixes as PR review comments (demo)
        if: always()
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: fix_suggestions.txt
