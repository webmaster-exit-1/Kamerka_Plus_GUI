name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        env:
            DJANGO_SECRET_KEY: "copilot-setup-not-a-real-secret"

        services:
            redis:
                image: redis:7
                ports:
                    - 6379:6379

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"
                  cache: "pip"

            - name: Install project dependencies
              run: pip install -r requirements.txt

            - name: Install system security tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y nmap libpcap-dev

            - name: Install HexStrike AI MCP server
              run: |
                  git clone https://github.com/0x4m4/hexstrike-ai.git /tmp/hexstrike-ai
                  pip install -r /tmp/hexstrike-ai/requirements.txt
                  # Make hexstrike available on PATH
                  echo "/tmp/hexstrike-ai" >> $GITHUB_PATH

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26"
                  check-latest: true
                  cache: false

            - name: Install ProjectDiscovery tools
              run: |
                  GOTOOLCHAIN=go1.26.0 go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest
                  $(go env GOPATH)/bin/pdtm -i nuclei,naabu
                  echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH

            - name: Django setup
              run: |
                  python manage.py check
                  python manage.py migrate --run-syncdb

            - name: Verify all security tools and scanning capabilities
              run: |
                  echo "══════════════════════════════════════════════════"
                  echo "  HexStrike Security Tool Verification"
                  echo "══════════════════════════════════════════════════"
                  FAIL_COUNT=0

                  echo ""
                  echo "── Network Scanning ─────────────────────────────"
                  echo "[nmap]"
                  nmap --version || { echo "  ✗ FAIL: nmap not found"; FAIL_COUNT=$((FAIL_COUNT+1)); }
                  echo ""
                  echo "[naabu]"
                  naabu -version || { echo "  ✗ FAIL: naabu not found"; FAIL_COUNT=$((FAIL_COUNT+1)); }
                  echo ""

                  echo "── Vulnerability Scanning ───────────────────────"
                  echo "[nuclei]"
                  nuclei -version || { echo "  ✗ FAIL: nuclei not found"; FAIL_COUNT=$((FAIL_COUNT+1)); }
                  echo ""
                  echo "[nuclei templates – china-iot]"
                  nuclei -validate -t nuclei_templates/china-iot/ || true
                  echo ""

                  echo "── Web Application Analysis ─────────────────────"
                  echo "[wappalyzer]"
                  pip show wappalyzer | head -3
                  echo ""

                  echo "── NSE Script Inventory ─────────────────────────"
                  echo "Custom NSE scripts:"
                  NSE_COUNT=$(ls -1 nmap_scripts/*.nse 2>/dev/null | wc -l)
                  echo "  Found: $NSE_COUNT scripts"
                  ls -1 nmap_scripts/*.nse 2>/dev/null
                  if [ "$NSE_COUNT" -eq 0 ]; then
                      echo "  ✗ FAIL: no NSE scripts found"
                      FAIL_COUNT=$((FAIL_COUNT+1))
                  fi
                  echo ""

                  echo "── Python Security Libraries ────────────────────"
                  for lib in shodan ipwhois selenium xmltodict; do
                      python -c "import $lib; print('  ✓ $lib')" 2>/dev/null || echo "  ✗ $lib: NOT INSTALLED"
                  done
                  python -c "from libnmap.process import NmapProcess; print('  ✓ libnmap')" 2>/dev/null || echo "  ✗ libnmap: NOT INSTALLED"
                  echo ""

                  echo "── HexStrike MCP Server ─────────────────────────"
                  test -f /tmp/hexstrike-ai/hexstrike_server.py && echo "  ✓ hexstrike_server.py" || { echo "  ✗ hexstrike_server.py: MISSING"; FAIL_COUNT=$((FAIL_COUNT+1)); }
                  test -f /tmp/hexstrike-ai/hexstrike_mcp.py && echo "  ✓ hexstrike_mcp.py" || { echo "  ✗ hexstrike_mcp.py: MISSING"; FAIL_COUNT=$((FAIL_COUNT+1)); }
                  python -c "import fastmcp; print('  ✓ fastmcp')" 2>/dev/null || echo "  ✗ fastmcp: NOT INSTALLED (non-critical)"

                  # Start hexstrike server and verify endpoints return real success
                  echo ""
                  echo "── HexStrike Endpoint Validation ────────────────"
                  cd /tmp/hexstrike-ai && python3 hexstrike_server.py --port 9999 &
                  HEXSTRIKE_PID=$!
                  sleep 6

                  # /health must return HTTP 200 AND valid JSON with status=healthy
                  HEALTH=$(curl -sf http://127.0.0.1:9999/health 2>/dev/null)
                  if [ $? -ne 0 ]; then
                      echo "  ✗ FAIL: /health returned non-200 or connection refused"
                      FAIL_COUNT=$((FAIL_COUNT+1))
                  else
                      STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
                      if [ "$STATUS" = "healthy" ]; then
                          TOOLS_AVAIL=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_tools_available',0))" 2>/dev/null)
                          echo "  ✓ /health: status=$STATUS, tools_available=$TOOLS_AVAIL"
                      else
                          echo "  ✗ FAIL: /health status='$STATUS' (expected 'healthy')"
                          FAIL_COUNT=$((FAIL_COUNT+1))
                      fi
                  fi

                  # /api/command must execute nmap and return real output (not empty with exit 0)
                  CMD_RESP=$(curl -sf -X POST http://127.0.0.1:9999/api/command \
                      -H "Content-Type: application/json" \
                      -d '{"command": "nmap --version"}' 2>/dev/null)
                  if [ $? -ne 0 ]; then
                      echo "  ✗ FAIL: /api/command returned non-200"
                      FAIL_COUNT=$((FAIL_COUNT+1))
                  else
                      HAS_OUTPUT=$(echo "$CMD_RESP" | python3 -c "
                  import sys,json
                  d=json.load(sys.stdin)
                  stdout=d.get('stdout','')
                  rc=d.get('return_code',-1)
                  if rc==0 and 'Nmap version' in stdout:
                      print('OK')
                  else:
                      print('FAIL:rc=%s,stdout_len=%d' % (rc, len(stdout)))
                  " 2>/dev/null)
                      if [ "$HAS_OUTPUT" = "OK" ]; then
                          echo "  ✓ /api/command nmap: returned valid output"
                      else
                          echo "  ✗ FAIL: /api/command nmap: $HAS_OUTPUT (false positive — exit 0 but no real output)"
                          FAIL_COUNT=$((FAIL_COUNT+1))
                      fi
                  fi

                  # Check visual endpoints — known broken in hexstrike v6.0 (methods missing)
                  for endpoint in "/api/visual/vulnerability-card" "/api/visual/summary-report" "/api/visual/tool-output"; do
                      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:9999$endpoint" \
                          -H "Content-Type: application/json" \
                          -d '{"tool":"nmap","output":"test","title":"test","findings":[],"vulnerability":{"title":"test","severity":"high"}}' 2>/dev/null)
                      if [ "$HTTP_CODE" = "200" ]; then
                          echo "  ✓ $endpoint: HTTP $HTTP_CODE"
                      elif [ "$HTTP_CODE" = "500" ]; then
                          echo "  ⚠ $endpoint: HTTP $HTTP_CODE (known hexstrike v6.0 bug — ModernVisualEngine missing methods)"
                      else
                          echo "  ✗ $endpoint: HTTP $HTTP_CODE"
                      fi
                  done

                  # Check intelligence endpoints
                  for endpoint in "/api/intelligence/analyze-target" "/api/intelligence/select-tools" "/api/intelligence/create-attack-chain"; do
                      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:9999$endpoint" \
                          -H "Content-Type: application/json" \
                          -d '{"target":"127.0.0.1","objective":"recon","phases":["reconnaissance"]}' 2>/dev/null)
                      if [ "$HTTP_CODE" = "200" ]; then
                          echo "  ✓ $endpoint: HTTP $HTTP_CODE"
                      else
                          echo "  ✗ $endpoint: HTTP $HTTP_CODE"
                      fi
                  done

                  kill $HEXSTRIKE_PID 2>/dev/null || true
                  cd "$GITHUB_WORKSPACE"
                  echo ""

                  echo "── Celery Task Scanning Capabilities ────────────"
                  python -c "
                  from kamerka.tasks import (
                      nmap_device_scan, nmap_manual_scan, nmap_rtsp_scan,
                      deep_protocol_scan, nuclei_scan, port_scan_task,
                      wappalyzer_scan, capture_screenshot, exploitdb_search,
                      nvd_lookup, honeypot_check, sbom_lookup, gfw_check,
                      NSE_SCRIPT_CATALOG,
                  )
                  tasks = [
                      'nmap_device_scan', 'nmap_manual_scan', 'nmap_rtsp_scan',
                      'deep_protocol_scan', 'nuclei_scan', 'port_scan_task',
                      'wappalyzer_scan', 'capture_screenshot', 'exploitdb_search',
                      'nvd_lookup', 'honeypot_check', 'sbom_lookup', 'gfw_check',
                  ]
                  print('Registered Celery scan tasks:')
                  for t in tasks:
                      print(f'  ✓ {t}')
                  print(f'\nNSE Script Catalog: {len(NSE_SCRIPT_CATALOG)} scripts')
                  for name, path in NSE_SCRIPT_CATALOG.items():
                      print(f'  • {name}: {path}')
                  "
                  echo ""

                  echo "══════════════════════════════════════════════════"
                  if [ "$FAIL_COUNT" -gt 0 ]; then
                      echo "  ⚠ Verification complete with $FAIL_COUNT failure(s)"
                      echo "  Some tools may need manual installation"
                  else
                      echo "  ✓ All security tools verified successfully"
                  fi
                  echo "══════════════════════════════════════════════════"

