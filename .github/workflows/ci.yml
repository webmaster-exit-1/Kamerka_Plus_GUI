name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  test:
    runs-on: ubuntu-latest
    # Using a stable Debian-based Python image to avoid the Arch 3.14 rollout
    container:
      image: python:3.13-slim-bookworm
    permissions:
      contents: read

    env:
      DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key"
      SHODAN_API_KEY: "ci-dummy-key"
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        apt-get update && apt-get install -y --no-install-recommends \
          git \
          golang-go \
          nmap \
          xvfb \
          libgl1-mesa-dri \
          libgl1-mesa-glx \
          libxrender1 \
          libxkbcommon-x11-0 \
          libdbus-1-3
        
    - name: Install Nuclei
      run: |
        go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Django System Checks
      run: |
        python manage.py check
        python manage.py migrate --run-syncdb

    - name: Run Tests with Virtual Display
      # xvfb-run allows the PyQt6/GUI code to initialize without a physical monitor
      run: |
        xvfb-run --server-args="-screen 0 1024x768x24" \
        python manage.py test app_kamerka tests -v2

    - name: Verify Security Tool Versions
      run: |
        nmap --version
        nuclei -version
        pip show wappalyzer
