name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: false

    - name: Install System Dependencies
      run: |
        sudo apt-get update || exit 1
        sudo apt-get install -y nmap chromium-browser || exit 1

    - name: Install ProjectDiscovery Tools (Nuclei)
      run: |
        go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest || exit 1
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH
        export PATH=$PATH:$(go env GOPATH)/bin:$HOME/.pdtm/go/bin
        pdtm -i nuclei || exit 1

    - name: Install Python Logic & Wappalyzer
      run: |
        pip install -r requirements.txt || exit 1
        pip install wappalyzer pytest || exit 1

    - name: Django System Checks
      run: |
        python manage.py check --fail-level WARNING || exit 1
        python manage.py migrate --run-syncdb || exit 1
        python manage.py collectstatic --noinput || exit 1

    - name: Run Django Test Suite
      run: |
        python manage.py test app_kamerka -v2 || exit 1

    - name: Run Unit Tests (pytest)
      run: |
        pytest tests/ -v --strict-markers --tb=short || exit 1

    - name: Verify Security Engine Health
      run: |
        nmap --version || exit 1
        nuclei -version || exit 1
        pip show wappalyzer || exit 1

    - name: Run China-IoT Template Validation
      run: |
        nuclei -validate -t nuclei_templates/china-iot/ || exit 1
