name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: false

    - name: Install System Dependencies
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y nmap chromium-browser

    - name: Install ProjectDiscovery Tools (Nuclei)
      run: |
        set -euo pipefail
        go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH
        export PATH=$PATH:$(go env GOPATH)/bin:$HOME/.pdtm/go/bin
        pdtm -i nuclei

    - name: Install Python Logic & Wappalyzer
      run: |
        set -euo pipefail
        pip install -r requirements.txt
        pip install wappalyzer pytest

    - name: Run Django Test Suite
      run: |
        set -euo pipefail
        python manage.py migrate --run-syncdb
        python manage.py test app_kamerka -v2

    - name: Run Unit Tests (pytest)
      run: |
        set -euo pipefail
        pytest tests/ -v

    - name: Verify Security Engine Health
      run: |
        set -euo pipefail
        nmap --version
        nuclei -version
        pip show wappalyzer

    - name: Run China-IoT Template Validation
      run: |
        set -euo pipefail
        # Ensure custom templates are valid and loadable
        nuclei -validate -t nuclei_templates/china-iot/
