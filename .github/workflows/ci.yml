name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key"
      SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nmap

    - name: Install ProjectDiscovery Tools (Nuclei)
      run: |
        go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest
        export PATH=$PATH:$(go env GOPATH)/bin
        pdtm -i nuclei
        echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Django System Checks
      run: |
        python manage.py check
        python manage.py migrate --run-syncdb

    - name: Run Tests
      run: python manage.py test app_kamerka tests -v2

    - name: China-IoT Template Validation
      run: nuclei -validate -t nuclei_templates/china-iot/

    - name: Verify Security Engine Health
      run: |
        nmap --version
        nuclei -version
        pip show wappalyzer
