name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:latest
    permissions:
      contents: read

    env:
      DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key-do-not-use-in-production"
      SHODAN_API_KEY: "ci-dummy-key"

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'
        cache: false

    - name: Install System Dependencies
      run: |
        pacman -Syu --noconfirm nmap

    - name: Cache pdtm tools
      uses: actions/cache@v4
      with:
        path: ~/.pdtm/go/bin
        key: pdtm-nuclei-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

    - name: Install ProjectDiscovery Tools (Nuclei)
      run: |
        go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
        echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH
        export PATH=$PATH:$(go env GOPATH)/bin:$HOME/.pdtm/go/bin
        if [ ! -f "$HOME/.pdtm/go/bin/nuclei" ]; then
          pdtm -i nuclei
        fi

    - name: Install Python Dependencies
      run: pip install -r requirements.txt

    - name: Django System Checks
      run: |
        python manage.py check --fail-level WARNING
        python manage.py migrate --run-syncdb
        python manage.py collectstatic --noinput

    - name: Run Tests
      run: python manage.py test app_kamerka tests -v2

    - name: Validate Nuclei Templates
      run: nuclei -validate -t nuclei_templates/china-iot/

    - name: Verify Security Engine Health
      run: |
        nmap --version
        nuclei -version
        pip show wappalyzer
