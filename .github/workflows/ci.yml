name: Kamerka Plus GUI CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      DJANGO_SECRET_KEY: "ci-only-not-a-real-secret-key"
      SHODAN_API_KEY: ${{ secrets.SHODAN_API_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpcap-dev nmap

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
        check-latest: true
        cache: false

    - name: Install ProjectDiscovery Tools
      run: |
        # Explicitly use modern toolchain for pdtm
        GOTOOLCHAIN=go1.26.0 go install -v github.com/projectdiscovery/pdtm/cmd/pdtm@latest
        # Install binaries now that libpcap-dev is present
        $(go env GOPATH)/bin/pdtm -i nuclei,naabu
        # Export the pdtm bin path to the global GITHUB_PATH
        echo "$HOME/.pdtm/go/bin" >> $GITHUB_PATH

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Django System Checks
      run: |
        python manage.py check
        python manage.py migrate --run-syncdb

    - name: Run Tests
      run: python manage.py test app_kamerka tests -v2

    - name: China-IoT Template Validation
      run: nuclei -validate -t nuclei_templates/china-iot/

    - name: Verify Security Engine Health
      run: |
        nmap --version
        naabu -version
        nuclei -version
        pip show wappalyzer

