id: zte-v8-detect

info:
  name: ZTE ZXHN V8 Series Detection
  author: kamerka-fork
  severity: info
  description: Detects ZTE ZXHN V8 series carrier gateway devices.
  metadata:
    max-request: 1
  tags: china-iot,zte,panel,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "ZXHN"
          - "ZTE"
        condition: and

      - type: word
        part: header
        words:
          - "ZTE"
