id: huawei-waf-detect

info:
  name: Huawei WAF Detection
  author: kamerka-fork
  severity: info
  description: Detects the presence of a Huawei Web Application Firewall.
  metadata:
    max-request: 1
  tags: china-iot,huawei,waf,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        part: header
        words:
          - "HWWAFSESID"
          - "huawei"
          - "X-Huawei-WAF"
          - "USG"
        condition: or

      - type: word
        words:
          - "Huawei"
          - "USG"
        condition: and
