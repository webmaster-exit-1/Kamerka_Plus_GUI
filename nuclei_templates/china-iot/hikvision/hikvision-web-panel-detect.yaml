id: hikvision-web-panel-detect

info:
  name: Hikvision Web Panel Detection
  author: kamerka-fork
  severity: info
  description: Detects the presence of a Hikvision web management panel.
  metadata:
    max-request: 1
  tags: china-iot,hikvision,panel,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/doc/page/login.asp"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "<title>HIKVISION</title>"
          - "hikvision-logo"
          - "app/i18n"
        condition: or

      - type: word
        words:
          - "Hikvision"
          - "hikvision"
          - "HIKVISION"
        condition: or

      - type: word
        words:
          - "doc/page/login.asp"
