id: dahua-web-panel-detect

info:
  name: Dahua Web Panel Detection
  author: kamerka-fork
  severity: info
  description: Detects the presence of a Dahua web management panel.
  metadata:
    max-request: 1
  tags: china-iot,dahua,panel,ics

requests:
  - method: GET
    redirects: true
    max-redirects: 3
    path:
      - "{{BaseURL}}/"

    stop-at-first-match: true

    matchers-condition: or
    matchers:
      - type: word
        words:
          - "<title>WEB SERVICE</title>"
          - "loginPage"
          - "cfg.userName"
          - "DahuaTech"
          - "DHVideoWEB"
        condition: or

      - type: word
        part: header
        words:
          - "DhWebClientPlugin"
          - "DHVideoWeb"
        condition: or

      - type: dsl
        dsl:
          - "contains(tolower(body), 'dahua') && status_code == 200"
