<script src="{% static 'js/leaflet.js' %}"></script>
<script src="{% static 'js/leaflet.heat.js' %}"></script>
<script src="{% static 'js/map_themes.js' %}"></script>

<script type="text/javascript">
function initialize() {
    var centerLat = 0, centerLon = 0;
    {% for device in devices %}
    {% if forloop.first and device.lat and device.lon %}
    centerLat = {{ device.lat }};
    centerLon = {{ device.lon }};
    {% endif %}
    {% endfor %}

    var map = L.map('leaflet_world_map', {
        minZoom: 1,
        maxZoom: 17
    }).setView([centerLat, centerLon], 3);

    // Apply saved theme (or default cyberpunk)
    var themeRef = { layer: null, currentKey: KamerkaTiles.savedTheme() };
    themeRef.layer = KamerkaTiles.apply(themeRef.currentKey, map);

    // Build device point list for markers + heat map
    var markers = [];
    var heatPoints = [];   // [lat, lon, intensity]
    {% for device in devices %}
    {% if device.lat and device.lon %}
    (function() {
        var vulns = "{{ device.vulns|default:'' }}";
        var intensity = Math.min(1.0, 0.2 + (vulns.match(/CVE-/g)||[]).length * 0.15);
        heatPoints.push([{{device.lat}}, {{device.lon}}, intensity]);
        var m = L.marker([{{device.lat}}, {{device.lon}}]).addTo(map);
        m.bindPopup('<a href="/results/{{device.search_id}}/{{device.id}}/{{device.ip}}">{{device.type}} — {{device.ip}}</a>');
        markers.push(m);
    })();
    {% endif %}
    {% endfor %}

    // Heat map layer (hidden by default, toggle via button)
    var heatLayer = L.heatLayer(heatPoints, {
        radius: 28, blur: 22, maxZoom: 10,
        gradient: { 0.1: '#0064d7', 0.4: '#00e1ff', 0.65: '#ff00cd', 1.0: '#ff0000' }
    });
    var heatVisible = false;

    if (markers.length > 1) {
        var group = L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.1));
    }

    // Inject theme picker + heat map toggle
    KamerkaTiles.injectPicker(map, themeRef, '.panel-heading');

    var mapEl = document.getElementById('leaflet_world_map');
    var heatBtn = document.createElement('button');
    heatBtn.textContent = '🌡 HEAT MAP';
    heatBtn.title = 'Toggle 2-D heat map (severity by CVE count)';
    heatBtn.style.cssText = 'position:absolute;top:8px;left:60px;z-index:1000;' +
        'background:rgba(10,13,18,0.88);border:1px solid #0064d7;color:#00e1ff;' +
        'font-family:var(--cp-font,monospace);font-size:0.62em;letter-spacing:0.06em;' +
        'padding:4px 8px;cursor:pointer;';
    heatBtn.addEventListener('click', function () {
        heatVisible = !heatVisible;
        if (heatVisible) {
            heatLayer.addTo(map);
            heatBtn.style.color = '#ff00cd';
            heatBtn.style.borderColor = '#ff00cd';
        } else {
            map.removeLayer(heatLayer);
            heatBtn.style.color = '#00e1ff';
            heatBtn.style.borderColor = '#0064d7';
        }
    });
    mapEl.appendChild(heatBtn);
}

document.addEventListener('DOMContentLoaded', function() {
    initialize();
});
</script>
